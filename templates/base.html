<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easter Food Order 🐣</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #fdf6ec;
      color: #333;
      min-height: 100vh;
    }
    header {
      background: #e87c3e;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.4rem; }
    header nav a {
      color: white;
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.9rem;
      opacity: 0.85;
    }
    header nav a:hover { opacity: 1; }
    main {
      max-width: 700px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h2 { margin-bottom: 1.25rem; color: #c05a1f; }
    .btn {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn-primary { background: #e87c3e; color: white; }
    .btn-primary:hover { background: #c05a1f; }
    .btn-danger { background: #e84040; color: white; }
    .btn-danger:hover { background: #b02020; }
    .btn-sm { padding: 0.35rem 0.9rem; font-size: 0.85rem; }
    label { display: block; font-weight: 600; margin-bottom: 0.3rem; }
    input[type=text], input[type=number] {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    input[type=text]:focus, input[type=number]:focus {
      outline: none;
      border-color: #e87c3e;
    }
  </style>
</head>
<body>
  <header>
    <span style="font-size:1.8rem">🐣</span>
    <h1>Easter Food Order</h1>
    <nav>
      <a href="/">Add my order</a>
      <a href="/edit">Change my order</a>
      <a href="/orders">See all orders</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
