{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Edit order for {{ name }}</h2>
  {% if not rows %}
  <p style="color:#999;margin-bottom:1.25rem;">No existing order found for this name. You can add items below.</p>
  {% endif %}
  <form method="POST" action="/edit/{{ name }}">
    <div id="items-container">
      {% if rows %}
        {% for row in rows %}
        <div class="item-row" style="margin-bottom:1rem;">
          {% if loop.first %}<label>Food item</label>{% endif %}
          <div style="display:flex;gap:0.5rem;align-items:flex-start;flex-wrap:wrap;">
            <input type="text" name="item[]" value="{{ row.item }}" required style="flex:2;min-width:150px;margin-bottom:0.4rem;">
            <input type="number" name="quantity[]" value="{{ row.quantity }}" min="1" style="width:70px;margin-bottom:0.4rem;">
            <input type="text" name="note[]" value="{{ row.note or '' }}" placeholder="Note (optional)" style="flex:2;min-width:120px;margin-bottom:0.4rem;">
            <button type="button" class="btn btn-sm btn-danger remove-row" style="margin-bottom:0.4rem;">✕</button>
          </div>
        </div>
        {% endfor %}
      {% else %}
        <div class="item-row" style="margin-bottom:1rem;">
          <label>Food item</label>
          <div style="display:flex;gap:0.5rem;align-items:flex-start;flex-wrap:wrap;">
            <input type="text" name="item[]" placeholder="e.g. Chocolate eggs" required style="flex:2;min-width:150px;margin-bottom:0.4rem;">
            <input type="number" name="quantity[]" value="1" min="1" style="width:70px;margin-bottom:0.4rem;">
            <input type="text" name="note[]" placeholder="Note (optional)" style="flex:2;min-width:120px;margin-bottom:0.4rem;">
          </div>
        </div>
      {% endif %}
    </div>

    <button type="button" id="add-item" class="btn btn-sm" style="background:#f0e0d0;color:#c05a1f;margin-bottom:1.25rem;">
      + Add another item
    </button>

    <br>
    <button type="submit" class="btn btn-primary">Save changes</button>
    <a href="/" style="margin-left:1rem;color:#999;font-size:0.9rem;">Cancel</a>
  </form>
</div>

<script>
  const container = document.getElementById('items-container');

  document.querySelectorAll('.remove-row').forEach(btn => {
    btn.addEventListener('click', () => btn.closest('.item-row').remove());
  });

  document.getElementById('add-item').addEventListener('click', () => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.style.marginBottom = '1rem';
    row.innerHTML = `
      <div style="display:flex;gap:0.5rem;align-items:flex-start;flex-wrap:wrap;">
        <input type="text" name="item[]" placeholder="e.g. Hot cross buns" style="flex:2;min-width:150px;margin-bottom:0.4rem;">
        <input type="number" name="quantity[]" value="1" min="1" style="width:70px;margin-bottom:0.4rem;">
        <input type="text" name="note[]" placeholder="Note (optional)" style="flex:2;min-width:120px;margin-bottom:0.4rem;">
        <button type="button" class="btn btn-sm btn-danger remove-row" style="margin-bottom:0.4rem;">✕</button>
      </div>
    `;
    container.appendChild(row);
    row.querySelector('.remove-row').addEventListener('click', () => row.closest('.item-row').remove());
    row.querySelector('input[name="item[]"]').focus();
  });
</script>
{% endblock %}
