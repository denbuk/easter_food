{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Upravit objednávku</h2>
  <p style="color:#666;margin-bottom:1.25rem;">Zadej své jméno pro načtení stávající objednávky.</p>
  <form method="POST" action="/edit">
    <label for="name">Tvoje jméno</label>
    <input type="text" id="name" name="name" placeholder="např. Anna" required autofocus>
    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i> Načíst objednávku</button>
  </form>
</div>
{% endblock %}
