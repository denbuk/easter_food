{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Co chceš k jídlu? 🥗</h2>
  <form method="POST" action="/submit" id="order-form">
    <label for="name">Tvoje jméno</label>
    <input type="text" id="name" name="name" placeholder="např. Anna" required autofocus>

    <datalist id="item-suggestions"></datalist>

    <div id="items-container">
      <div class="item-row" style="margin-bottom:1rem;">
        <label>Položka</label>
        <div class="item-row-inner">
          <input type="text" name="item[]" list="item-suggestions" placeholder="např. Čokoládová vajíčka" required style="margin-bottom:0;">
          <input type="number" name="quantity[]" value="1" min="1" style="margin-bottom:0;">
          <div class="note-remove">
            <input type="text" name="note[]" placeholder="Poznámka (nepovinné)">
          </div>
        </div>
      </div>
    </div>

    <button type="button" id="add-item" class="btn btn-sm no-print" style="background:#f0e0d0;color:#c05a1f;margin-bottom:1.25rem;">
      + Přidat další položku
    </button>

    <br>
    <button type="submit" class="btn btn-primary">Odeslat objednávku</button>
  </form>
</div>

<script>
  fetch('/api/items').then(r => r.json()).then(items => {
    const dl = document.getElementById('item-suggestions');
    items.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      dl.appendChild(opt);
    });
  });

  const container = document.getElementById('items-container');
  document.getElementById('add-item').addEventListener('click', () => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.style.marginBottom = '1rem';
    row.innerHTML = `
      <div class="item-row-inner">
        <input type="text" name="item[]" list="item-suggestions" placeholder="např. Mazanec" style="margin-bottom:0;">
        <input type="number" name="quantity[]" value="1" min="1" style="margin-bottom:0;">
        <div class="note-remove">
          <input type="text" name="note[]" placeholder="Poznámka (nepovinné)">
          <button type="button" class="btn btn-sm btn-danger remove-row">✕</button>
        </div>
      </div>
    `;
    container.appendChild(row);
    row.querySelector('.remove-row').addEventListener('click', () => row.remove());
    row.querySelector('input[name="item[]"]').focus();
  });
</script>
{% endblock %}
